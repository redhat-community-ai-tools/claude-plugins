name: Validate Plugins

on:
  pull_request:
    paths:
      - 'plugins/**'
      - '.claude-plugin/**'
      - 'plugin-schema.json'
      - 'scripts/validate.py'
      - 'tests/**'
  push:
    branches: [main]
    paths:
      - 'plugins/**'
      - '.claude-plugin/**'
      - 'plugin-schema.json'
      - 'scripts/validate.py'
      - 'tests/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install 'jsonschema>=4.20,<5'
      - run: python scripts/validate.py
      - run: python tests/test_validate.py
